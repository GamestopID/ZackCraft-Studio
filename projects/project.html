<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Projects - ZackCraft Studio</title>
    <link rel="stylesheet" href="project.css" />
    <!-- FONTS -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Montserrat:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&family=Outfit:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />
  </head>
  <body>
    <!-- ===== NAVBAR ===== -->
    <header class="nav-wrap">
      <nav class="navbar">
        <div class="logo">
          <img src="/img/logo.png" alt="Logo" />
          <span>ZackCraft</span>
        </div>

        <button class="menu-toggle" id="menuToggle">
          <span></span>
          <span></span>
          <span></span>
        </button>

        <div class="nav-panel" id="navLinks">
          <div class="menu-header">
            <div class="menu-header-top">
              <div class="menu-avatar"><i class="fa-solid fa-cube"></i></div>
              <div class="menu-title">
                <h2>ZackCraft</h2>
                <span>Studio</span>
              </div>
            </div>
            <p class="menu-sub">Minecraft Projects & Downloads</p>
          </div>

          <div class="nav-links">
            <a href="/index.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="/store/store.html"
              ><i class="fa-solid fa-store"></i> Store</a
            >
            <a href="project.html"><i class="fa-solid fa-cube"></i> Projects</a>
            <a href="/social/social.html"
              ><i class="fa-solid fa-share-nodes"></i> Social</a
            >
          </div>
        </div>
      </nav>
    </header>

    <!-- PAGE HEADER -->
    <header class="page-header">
      <h1>Download Projects</h1>
      <p>Pilih projects dari ZackStudio mana yang anda inginkan!</p>
    </header>

    <!-- CATEGORY MENU -->
    <div class="category-menu">
      <button class="category-btn active" data-filter="all">All</button>
      <button class="category-btn" data-filter="plugin">Plugin</button>
      <button class="category-btn" data-filter="addon">Addon</button>
      <button class="category-btn" data-filter="worlds">Worlds</button>
    </div>

    <!-- PROJECT GRID -->
    <div class="project-grid">
      <!-- Plugin -->
      <div class="project-item" data-category="plugin">
        <div class="project-card">
          <div class="project-img">
            <img src="/img/JumpBoost.png" alt="Plugin 1" />
          </div>
          <span class="project-badge">v1.0</span>
          <h3>AutoBoost Jump</h3>
          <p class="card-desc">
            Otomatis JumpBoost kedepan saat berada di posisi yang ditentukan
            <strong>PM5</strong>.
          </p>
          <div class="cta-row">
            <a href="https://sfl.gl/Kd6x" class="btn download-btn">Download</a>
          </div>
        </div>
      </div>
    </div>

    <div id="overlay"></div>

    <script src="project.js"></script>
  </body>
</html>
